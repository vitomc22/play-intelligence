services:
  # ─── Ollama: Modelo local (Qwen 7B) ─────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: playwright-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS="*"
      # Context window grande para o Aider funcionar bem
      - OLLAMA_CONTEXT_LENGTH=32768
    restart: unless-stopped
    network_mode: bridge
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama_data:
    driver: local
